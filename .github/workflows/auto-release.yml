name: Auto Release

on:
  push:
    branches:
      - main
    paths:
      - VERSION
      - CHANGELOG.md
      - metadata/loopengineer.json
      - .codex-plugin/plugin.json
      - "docs/releases/v*.md"

permissions:
  contents: write

concurrency:
  group: auto-release-main
  cancel-in-progress: false

jobs:
  release:
    name: auto release
    if: github.repository == 'MC-and-his-Agents/LoopEngineer'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release target
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main and tags
        run: git fetch --tags origin main

      - name: Prepare release plan
        id: prepare
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          args=(
            --auto-version
            --release-mode auto
            --draft-release
            --target-commit "$(git rev-parse HEAD)"
            --main-commit "$(git rev-parse origin/main)"
            --release-notes-file release-notes.md
          )
          set +e
          python3 scripts/prepare_manual_release.py "${args[@]}" > release-evidence.json
          exit_code=$?
          set -e
          python3 - <<'PY'
          import json
          import os
          data = json.loads(open("release-evidence.json", encoding="utf-8").read())
          data["workflowRun"] = {
              "runId": os.environ["GITHUB_RUN_ID"],
              "url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
          }
          with open("release-evidence.json", "w", encoding="utf-8") as handle:
              json.dump(data, handle, ensure_ascii=False, indent=2, sort_keys=True)
              handle.write("\n")
          PY
          cat release-evidence.json
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          data = json.loads(open("release-evidence.json", encoding="utf-8").read())
          print(f"status={data['status']}")
          print(f"plan={data['plan']}")
          print(f"tag={data['tag']}")
          print(f"target_commit={data['targetCommit']}")
          PY
          exit "$exit_code"

      - name: Create tag
        if: steps.prepare.outputs.plan == 'create'
        run: |
          git tag "${{ steps.prepare.outputs.tag }}" "${{ steps.prepare.outputs.target_commit }}"
          git push origin "${{ steps.prepare.outputs.tag }}"

      - name: Create draft GitHub Release
        if: steps.prepare.outputs.plan == 'create'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create \
            "${{ steps.prepare.outputs.tag }}" \
            --target "${{ steps.prepare.outputs.target_commit }}" \
            --title "${{ steps.prepare.outputs.tag }}" \
            --notes-file release-notes.md \
            --draft
          python3 - <<'PY'
          import json
          import subprocess
          data = json.loads(open("release-evidence.json", encoding="utf-8").read())
          tag = data["tag"]
          url = subprocess.check_output(
              ["gh", "release", "view", tag, "--json", "url", "--jq", ".url"],
              text=True,
          ).strip()
          data["releaseUrl"] = url
          data["conclusion"] = "created"
          with open("release-evidence.json", "w", encoding="utf-8") as handle:
              json.dump(data, handle, ensure_ascii=False, indent=2, sort_keys=True)
              handle.write("\n")
          PY

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-release-evidence-${{ github.run_id }}
          path: |
            release-evidence.json
            release-notes.md
          if-no-files-found: ignore
